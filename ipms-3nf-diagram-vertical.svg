<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="2550" viewBox="0 0 2100 2550">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ece5d9" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#ddd3c3" stroke-width="1.2"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111; }
      .legend-text { font: 17px Arial, Helvetica, sans-serif; }
      .legend-note { font: 700 16px Arial, Helvetica, sans-serif; fill: #111; }
      .table-label { font: 700 20px Georgia, "Times New Roman", serif; fill: #111; }
      .cell { fill: #fff; stroke: #111; stroke-width: 2; }
      .field { font: 16px Georgia, "Times New Roman", serif; fill: #111; dominant-baseline: middle; text-anchor: middle; }
      .pk { fill: #d93b33; }
      .fk { fill: #84be66; }
      .connector { fill: none; stroke: #111; stroke-width: 2.4; marker-end: url(#arrow); }
      .note { font: 20px Georgia, "Times New Roman", serif; fill: #111; }
    </style>
  </defs>

