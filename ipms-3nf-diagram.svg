<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="1600" viewBox="0 0 3000 1600">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e7e1d8" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d8d0c4" stroke-width="1.2"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .legend-label { font: 600 16px Arial, Helvetica, sans-serif; fill: #111; }
      .legend-text { font: 16px Arial, Helvetica, sans-serif; }
      .table-label { font: 600 16px Georgia, "Times New Roman", serif; fill: #111; }
      .cell { fill: #fff; stroke: #111; stroke-width: 1.8; }
      .field { font: 13px Georgia, "Times New Roman", serif; fill: #111; dominant-baseline: middle; text-anchor: middle; }
      .pk { fill: #d63b36; }
      .fk { fill: #8cc56e; }
      .connector { fill: none; stroke: #111; stroke-width: 2.5; marker-end: url(#arrow); }
      .note { font: 18px Georgia, "Times New Roman", serif; fill: #111; }
    </style>
  </defs>

