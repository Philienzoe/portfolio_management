  <text x="70" y="1518" class="note">
    From the diagram, we can see that each non-key attribute depends only on its primary key, with entity-specific detail split into
  </text>
  <text x="70" y="1548" class="note">
    subtype and reference tables. The current IPMS structure therefore presents a clean Third Normal Form (3NF) style layout.
